services:
  aplicacion:
    build: ./app
    container_name: aplicacion_dinamica_web
    ports:
      - "${APP_PORT:-8080}:80"
    environment:
      DB_HOST: base_datos
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:-aplicacion_dinamica}
      DB_USER: ${MYSQL_USER:-usuario_app}
      DB_PASSWORD: ${MYSQL_PASSWORD:-clave_app}
    volumes:
      - ./app:/var/www/html
    depends_on:
      - base_datos
    networks:
      - red_aplicacion

  base_datos:
    image: mysql:8.0
    container_name: aplicacion_dinamica_bd
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-aplicacion_dinamica}
      MYSQL_USER: ${MYSQL_USER:-usuario_app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-clave_app}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-clave_root}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - datos_mysql:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - red_aplicacion

volumes:
  datos_mysql:

networks:
  red_aplicacion:
    driver: bridge
